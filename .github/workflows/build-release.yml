name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          echo "y" | sdkmanager \
            "ndk;27.1.12297006" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "cmake;3.22.1"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix expo-modules-core Gradle bugs
        run: |
          FILE="node_modules/expo-modules-core/android/build.gradle"
          sed -i "s|apply plugin: 'com.android.library'|// Fix: project-level re-declaration\ndef _coreFeatures = project.findProperty(\"coreFeatures\") ?: []\next.shouldIncludeCompose = _coreFeatures.contains(\"compose\")\n\napply plugin: 'com.android.library'|" "$FILE"
          sed -i 's/^\s*compose shouldIncludeCompose\s*$/    compose = shouldIncludeCompose/' "$FILE"

      - name: Read version from app.json
        id: meta
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease \
            --no-daemon \
            -Pandroid.overridePathCheck=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          DEST="AeroStaffPro-${{ github.ref_name }}.apk"
          cp "$APK" "$DEST"
          echo "apk=$DEST" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AeroStaff Pro ${{ github.ref_name }}"
          body: |
            ## 📦 AeroStaff Pro ${{ github.ref_name }}

            Scarica `AeroStaffPro-${{ github.ref_name }}.apk` e installalo sul tuo dispositivo Android.

            > Se hai già una versione installata con lo stesso keystore debug, puoi aggiornare direttamente senza disinstallare.
          files: ${{ env.apk }}
          draft: false
          prerelease: false
