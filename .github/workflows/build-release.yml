name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'claude/fix-shift-permissions-Cn8gk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          echo "y" | sdkmanager \
            "ndk;27.1.12297006" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "cmake;3.22.1"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix expo-modules-core Gradle bugs
        run: |
          FILE="node_modules/expo-modules-core/android/build.gradle"
          sed -i "s|apply plugin: 'com.android.library'|// Fix: project-level re-declaration\ndef _coreFeatures = project.findProperty(\"coreFeatures\") ?: []\next.shouldIncludeCompose = _coreFeatures.contains(\"compose\")\n\napply plugin: 'com.android.library'|" "$FILE"
          sed -i 's/^\s*compose shouldIncludeCompose\s*$/    compose = shouldIncludeCompose/' "$FILE"

      - name: Compute release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Restore stable keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/debug.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease \
            --no-daemon \
            -Pandroid.overridePathCheck=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          DEST="AeroStaffPro-${{ steps.meta.outputs.tag }}.apk"
          cp "$APK" "$DEST"
          echo "apk=$DEST" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "AeroStaff Pro ${{ steps.meta.outputs.tag }}"
          body: |
            ## 📦 AeroStaff Pro ${{ steps.meta.outputs.tag }}

            ### Novità
            - Filtro compagnie applicato a timeline home, conteggio voli nel turno e widget
            - Password salvate in modo sicuro con Android Keystore (migrazione automatica)
            - Nome app aggiornato a AeroStaff Pro, icona rinnovata aereo + badge
            - Tema scuro per il WebView TravelDoc

            ### Bug fixes
            - StaffMonitor: il parser gate/check-in/stand ora restituisce correttamente i dati
            - Card: rimossi i bordini interni in tema chiaro e scuro
            - Layout card voli: footer stand/CI/gate attaccato alla card, pill stato su riga propria

            Scarica `AeroStaffPro-${{ steps.meta.outputs.tag }}.apk` e installalo sul tuo dispositivo Android.
          files: ${{ env.apk }}
          draft: false
          prerelease: false
